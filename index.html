<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OxyLearn</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f5f7fa;
  color: #333;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: center;
  padding: 20px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}
.logo {
  font-size: 50px;
  font-weight: 800;
  background: linear-gradient(45deg, #00c6ff, #00c853);

  background-clip: text;
  -webkit-background-clip: text;

  -webkit-text-fill-color: transparent; /* important for safari */
}

/* HERO */
.hero {
  padding: 100px 20px;
  background: linear-gradient(135deg, #00c6ff, #00c853);
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
}

.hero .btn {
  margin-top: 25px;
  padding: 14px 30px;
  border-radius: 30px;
  background: white;
  color: #00c853;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.hero .btn:hover {
  transform: scale(1.05);
}

/* SECTION */
section {
  padding: 70px 8%;
}

.section-title {
  text-align: center;
  margin-bottom: 40px;
  font-size: 28px;
  font-weight: 700;
}

/* COURSES */
.courses {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.course-card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.course-card:hover {
  transform: translateY(-8px);
}

/* AI */
.ai-box {
  background: linear-gradient(135deg, #00c6ff, #00c853);
  padding: 35px;
  border-radius: 25px;
  text-align: center;
  color: white;
}

.ai-box input {
  margin-top: 15px;
  padding: 14px;
  width: 80%;
  border-radius: 30px;
  border: none;
  outline: none;
}

.ai-box button {
  margin-top: 10px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #00c853;
  cursor: pointer;
}

#responseText {
  margin-top: 15px;
}

/* VIDEO */
.video {
  text-align: center;
}

iframe {
  width: 100%;
  max-width: 700px;
  height: 350px;
  border-radius: 20px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">OXYLEARN</div>
</nav>

<div class="hero">
  <h1>Smart Learning with AI</h1>
  <p>Ask doubts instantly & learn faster</p>
  <div class="btn" onclick="openWhatsApp()">Book Free Demo</div>
</div>

<section>
  <div class="section-title">Our Courses</div>
  <div class="courses">
    <div class="course-card">📘 Class 6–8</div>
    <div class="course-card">📗 Class 9–10</div>
    <div class="course-card">➗ Maths</div>
    <div class="course-card">🔬 Science</div>
  </div>
</section>

<section>
  <div class="section-title">AI Doubt Solver</div>

  <div class="ai-box">
    <p>Ask any question and get instant answers</p>

    <input id="userInput" type="text" placeholder="Type your doubt...">
    <button onclick="sendMessage()">Ask AI</button>

    <p id="responseText"></p>
  </div>
</section>

<section class="video">
  <div class="section-title">Free Demo Class</div>

  <!-- ✅ FIXED VIDEO -->
  <iframe src="https://www.youtube.com/embed/7FRoZK8R40Y" allowfullscreen></iframe>
</section>

<footer>
  © 2026 OxyLearn <br>
  📞 Contact: +91 98765 43210
</footer>
<div class="whatsapp" onclick="openWhatsApp()">💬</div>

<script>
async function sendMessage() {
  const input = document.getElementById("userInput");
  const responseBox = document.getElementById("responseText");

  if (!input.value) {
    responseBox.innerText = "Enter a question";
    return;
  }

  responseBox.innerText = "Thinking...";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: input.value })
    });

    const data = await res.json();
    responseBox.innerText = data.reply;

    input.value = "";

  } catch {
    responseBox.innerText = "Error connecting";
  }
}

/* ENTER KEY SUPPORT */
document.getElementById("userInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

/* WHATSAPP */
function openWhatsApp() {
  const input = document.getElementById("userInput").value || "";

  const msg = encodeURIComponent(
    "Hello, I want to join OxyLearn. My doubt: " + input
  );

  const phone = "91XXXXXXXXXX"; // 🔴 PUT CLIENT NUMBER

  window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
}
</script>

</body>
</html>
